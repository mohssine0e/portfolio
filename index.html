<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohssine Echlaihi | Backend Engineer</title>
    <meta name="description" content="Mohssine Echlaihi — Java backend developer focused on Spring Boot microservices and distributed systems.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #faf7f2;
            --bg-tint: #f1ece1;
            --ink: #1c1917;
            --ink-soft: #57534e;
            --ink-mute: #8a8378;
            --accent: #9a3412;
            --accent-soft: rgba(154, 52, 18, 0.09);
            --line: #e2dcce;
            --font-display: 'Fraunces', Georgia, serif;
            --font-body: 'Inter', -apple-system, sans-serif;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #18140f;
                --bg-tint: #221c15;
                --ink: #f2ede3;
                --ink-soft: #c9bfaf;
                --ink-mute: #948a7a;
                --accent: #e08a54;
                --accent-soft: rgba(224, 138, 84, 0.12);
                --line: #33291d;
            }
        }
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            margin: 0;
            font-family: var(--font-body);
            background-color: var(--bg);
            color: var(--ink);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3 { font-family: var(--font-display); color: var(--ink); margin: 0; }
        a { color: var(--accent); }
        .wrap { max-width: 760px; margin: 0 auto; padding: 0 1.5rem; }

        /* Nav */
        .site-nav {
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(8px);
            background: color-mix(in srgb, var(--bg) 85%, transparent);
            border-bottom: 1px solid var(--line);
        }
        .site-nav .wrap { display: flex; align-items: center; justify-content: space-between; height: 3.5rem; max-width: 760px; }
        .site-nav .brand { font-family: var(--font-display); font-weight: 600; font-size: 1.05rem; text-decoration: none; color: var(--ink); }
        .site-nav ul { list-style: none; display: flex; gap: 1.25rem; margin: 0; padding: 0; }
        .site-nav a.nav-link { color: var(--ink-soft); text-decoration: none; font-size: 0.85rem; letter-spacing: 0.02em; }
        .site-nav a.nav-link:hover, .site-nav a.nav-link.active { color: var(--accent); }
        @media (max-width: 640px) { .site-nav ul { gap: 0.85rem; } .site-nav a.nav-link span { display: none; } }

        /* Hero */
        .hero { padding: 4rem 0 3rem; }
        .hero-grid { display: grid; grid-template-columns: 1fr auto; gap: 2.5rem; align-items: center; }
        .hero h1 { font-size: clamp(2rem, 5vw, 2.75rem); font-weight: 500; letter-spacing: -0.01em; }
        .hero .title { color: var(--accent); font-weight: 500; margin-top: 0.5rem; font-size: 1.05rem; }
        .hero .headline { color: var(--ink-soft); margin-top: 0.75rem; max-width: 42ch; }
        .hero .cta-row { margin-top: 1.5rem; display: flex; gap: 0.75rem; flex-wrap: wrap; }
        .avatar-frame {
            width: 132px;
            height: 132px;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--line);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            flex-shrink: 0;
        }
        .avatar-frame img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(45%) sepia(8%);
        }
        @media (max-width: 560px) { .hero-grid { grid-template-columns: 1fr; text-align: left; } .avatar-frame { order: -1; width: 88px; height: 88px; } }

        /* Buttons / chips */
        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.6rem 1.1rem; border-radius: 6px;
            text-decoration: none; font-size: 0.9rem; font-weight: 500;
            border: 1px solid var(--line);
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }
        .btn--primary { background: var(--accent); color: #fdf6f0; border-color: var(--accent); }
        .btn--primary:hover { opacity: 0.9; }
        .btn--ghost { color: var(--ink); background: transparent; }
        .btn--ghost:hover { border-color: var(--accent); color: var(--accent); }

        .chip-group { display: flex; flex-wrap: wrap; gap: 0.4rem; }
        .chip {
            font-size: 0.78rem; padding: 0.3rem 0.65rem; border-radius: 5px;
            border: 1px solid var(--line); color: var(--ink-soft); background: var(--bg-tint);
        }

        /* Sections */
        .section { padding: 3rem 0; border-top: 1px solid var(--line); opacity: 0; transform: translateY(14px); transition: opacity 0.6s ease, transform 0.6s ease; }
        .section.is-visible { opacity: 1; transform: translateY(0); }
        .section--tint { background: var(--bg-tint); }
        .section-label { text-transform: uppercase; letter-spacing: 0.12em; font-size: 0.75rem; color: var(--accent); font-weight: 600; }
        .section-heading { font-size: 1.6rem; margin-top: 0.4rem; margin-bottom: 1.5rem; font-weight: 500; }
        .lede { color: var(--ink-soft); max-width: 62ch; }

        .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem 2rem; margin-top: 1.5rem; font-size: 0.9rem; }
        .meta-grid dt { color: var(--ink-mute); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.2rem; }
        .meta-grid dd { margin: 0; color: var(--ink); }

        .skill-group { margin-bottom: 1.25rem; }
        .skill-group h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.6rem; color: var(--ink-soft); font-family: var(--font-body); }
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; }

        .entry { display: grid; grid-template-columns: 130px 1fr; gap: 1.25rem; padding: 1.25rem 0; border-bottom: 1px solid var(--line); }
        .entry:last-child { border-bottom: none; }
        .entry-date { color: var(--ink-mute); font-size: 0.82rem; padding-top: 0.15rem; }
        .entry-title { font-size: 1.1rem; font-weight: 600; font-family: var(--font-body); }
        .entry-org { color: var(--accent); font-size: 0.9rem; margin-top: 0.1rem; }
        .entry ul { margin: 0.6rem 0 0; padding-left: 1.1rem; color: var(--ink-soft); font-size: 0.92rem; }
        .entry ul li { margin-bottom: 0.3rem; }
        @media (max-width: 560px) { .entry { grid-template-columns: 1fr; gap: 0.35rem; } }

        .project { padding: 1.75rem 0; border-bottom: 1px solid var(--line); }
        .project:last-child { border-bottom: none; }
        .project h3 { font-size: 1.3rem; font-weight: 500; margin-bottom: 0.4rem; }
        .project p.desc { color: var(--ink-soft); margin-bottom: 1rem; }
        .project .chip-group { margin-bottom: 1rem; }
        .project ul { padding-left: 1.1rem; color: var(--ink-soft); font-size: 0.92rem; margin-bottom: 1rem; }
        .project ul li { margin-bottom: 0.3rem; }
        .diagram { width: 100%; max-width: 480px; margin: 0.5rem 0 1.25rem; display: block; }
        .diagram text { font-family: var(--font-body); fill: var(--ink-soft); }
        .diagram rect.node { fill: var(--bg-tint); stroke: var(--line); }
        .diagram rect.gateway { fill: var(--accent-soft); stroke: var(--accent); }
        .diagram line, .diagram path { stroke: var(--ink-mute); stroke-width: 1; fill: none; }

        .link-list { display: flex; flex-direction: column; gap: 0.6rem; margin: 1.25rem 0; }
        .link-item { display: inline-flex; align-items: center; gap: 0.65rem; text-decoration: none; color: var(--ink); font-size: 0.95rem; width: fit-content; }
        .link-item i { color: var(--accent); width: 1.1rem; text-align: center; }
        .link-item:hover { color: var(--accent); }

        .site-footer { text-align: center; padding: 2.5rem 0; color: var(--ink-mute); font-size: 0.85rem; }
    </style>
</head>
<body>
    <nav class="site-nav">
        <div class="wrap">
            <a href="#top" class="brand">Mohssine Echlaihi</a>
            <ul id="nav-links">
                <li><a class="nav-link" href="#about"><span>01 </span>About</a></li>
                <li><a class="nav-link" href="#skills"><span>02 </span>Skills</a></li>
                <li><a class="nav-link" href="#experience"><span>03 </span>Experience</a></li>
                <li><a class="nav-link" href="#projects"><span>04 </span>Projects</a></li>
                <li><a class="nav-link" href="#contact"><span>05 </span>Contact</a></li>
            </ul>
        </div>
    </nav>

    <div id="app">
        <p class="wrap" style="padding-top: 3rem; color: var(--ink-mute);">Loading...</p>
    </div>

    <script>
        function renderChips(items) {
            return (items || []).map(s => `<span class="chip">${s}</span>`).join('');
        }

        function renderHero(data) {
            const p = data.personal;
            return `
                <header class="hero" id="top">
                    <div class="wrap hero-grid">
                        <div>
                            <h1>${p.name}</h1>
                            <p class="title">${p.title}</p>
                            <p class="headline">${p.headline}</p>
                            <div class="cta-row">
                                <a href="${data.socials.email}" class="btn btn--primary"><i class="far fa-envelope"></i> Email me</a>
                                <a href="${data.socials.github}" target="_blank" rel="noopener noreferrer" class="btn btn--ghost"><i class="fab fa-github"></i> GitHub</a>
                                <a href="${data.socials.linkedin}" target="_blank" rel="noopener noreferrer" class="btn btn--ghost"><i class="fab fa-linkedin"></i> LinkedIn</a>
                            </div>
                        </div>
                        <div class="avatar-frame">
                            <img src="public/images/my_face.png" alt="${p.name}">
                        </div>
                    </div>
                </header>
            `;
        }

        function renderAbout(data) {
            const p = data.personal;
            return `
                <section class="section" id="about">
                    <div class="wrap">
                        <p class="section-label">01 — About</p>
                        <h2 class="section-heading">Profile</h2>
                        <p class="lede">${p.description}</p>
                        <dl class="meta-grid">
                            <div><dt>Location</dt><dd>${p.location}</dd></div>
                            <div><dt>Focus</dt><dd>Microservices &amp; distributed systems</dd></div>
                            <div><dt>Stack</dt><dd>Java, Spring Boot</dd></div>
                            <div><dt>Seeking</dt><dd>PFA internship (2&ndash;3 months)</dd></div>
                        </dl>
                    </div>
                </section>
            `;
        }

        function renderSkills(data) {
            const s = data.technical_skills;
            const groups = [
                ['Programming', s.programming],
                ['Backend', s.backend],
                ['Frontend', s.frontend],
                ['Databases', s.databases],
                ['DevOps & Tools', s.devops_tools],
                ['Concepts', s.concepts],
                ['Other', s.other]
            ];
            return `
                <section class="section section--tint" id="skills">
                    <div class="wrap">
                        <p class="section-label">02 — Skills</p>
                        <h2 class="section-heading">Toolbox</h2>
                        <div class="skills-grid">
                            ${groups.map(([label, items]) => `
                                <div class="skill-group">
                                    <h3>${label}</h3>
                                    <div class="chip-group">${renderChips(items)}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </section>
            `;
        }

        function renderExperienceEducation(data) {
            const expItems = (data.experience || []).map(e => `
                <div class="entry">
                    <div class="entry-date">${e.duration}</div>
                    <div>
                        <div class="entry-title">${e.position}</div>
                        <div class="entry-org">${e.company}${e.location ? ' · ' + e.location : ''}</div>
                        <div class="chip-group" style="margin-top:0.6rem;">${renderChips(e.technologies)}</div>
                        <ul>${(e.responsibilities || []).map(r => `<li>${r}</li>`).join('')}</ul>
                    </div>
                </div>
            `).join('');

            const eduItems = (data.education || []).map(ed => `
                <div class="entry">
                    <div class="entry-date">${ed.period}</div>
                    <div>
                        <div class="entry-title">${ed.degree}${ed.honors ? ' — ' + ed.honors : ''}</div>
                        <div class="entry-org">${ed.institution}</div>
                        ${ed.coursework ? `<p style="color:var(--ink-soft); font-size:0.9rem; margin-top:0.5rem;">Coursework: ${ed.coursework.join(', ')}</p>` : ''}
                    </div>
                </div>
            `).join('');

            return `
                <section class="section" id="experience">
                    <div class="wrap">
                        <p class="section-label">03 — Experience</p>
                        <h2 class="section-heading">Where I've worked</h2>
                        ${expItems}
                    </div>
                </section>
                <section class="section section--tint" id="education">
                    <div class="wrap">
                        <p class="section-label">Education</p>
                        <h2 class="section-heading">Where I've studied</h2>
                        ${eduItems}
                    </div>
                </section>
            `;
        }

        function microservicesDiagram() {
            return `
            <svg class="diagram" viewBox="0 0 480 180" role="img" aria-label="API gateway routing to Student, Course, and Enrollment services, each backed by its own database">
                <rect class="node gateway" x="190" y="10" width="100" height="34" rx="6"></rect>
                <text x="240" y="31" font-size="12" text-anchor="middle">API Gateway</text>

                <rect class="node" x="20" y="110" width="120" height="34" rx="6"></rect>
                <text x="80" y="131" font-size="12" text-anchor="middle">Student Service</text>

                <rect class="node" x="180" y="110" width="120" height="34" rx="6"></rect>
                <text x="240" y="131" font-size="12" text-anchor="middle">Course Service</text>

                <rect class="node" x="340" y="110" width="120" height="34" rx="6"></rect>
                <text x="400" y="131" font-size="12" text-anchor="middle">Enrollment Service</text>

                <text x="80" y="172" font-size="10" text-anchor="middle">MySQL</text>
                <text x="240" y="172" font-size="10" text-anchor="middle">MySQL</text>
                <text x="400" y="172" font-size="10" text-anchor="middle">MySQL</text>

                <path d="M220 44 L80 110"></path>
                <path d="M240 44 L240 110"></path>
                <path d="M260 44 L400 110"></path>
            </svg>`;
        }

        function rolesDiagram() {
            return `
            <svg class="diagram" viewBox="0 0 480 130" role="img" aria-label="Role hierarchy: Admin above Department Head, Coordinator, and Professor">
                <rect class="node gateway" x="190" y="10" width="100" height="34" rx="6"></rect>
                <text x="240" y="31" font-size="12" text-anchor="middle">Admin</text>

                <rect class="node" x="10" y="86" width="110" height="34" rx="6"></rect>
                <text x="65" y="107" font-size="12" text-anchor="middle">Dept. Head</text>

                <rect class="node" x="185" y="86" width="110" height="34" rx="6"></rect>
                <text x="240" y="107" font-size="12" text-anchor="middle">Coordinator</text>

                <rect class="node" x="360" y="86" width="110" height="34" rx="6"></rect>
                <text x="415" y="107" font-size="12" text-anchor="middle">Professor</text>

                <path d="M220 44 L65 86"></path>
                <path d="M240 44 L240 86"></path>
                <path d="M260 44 L415 86"></path>
            </svg>`;
        }

        function renderProjects(data) {
            const diagrams = {
                'Student Enrollment System - Microservices Architecture': microservicesDiagram,
                'University Academic Management Platform': rolesDiagram
            };
            const items = (data.projects || []).map(pr => `
                <div class="project">
                    <h3>${pr.name}</h3>
                    <p class="desc">${pr.description}</p>
                    ${diagrams[pr.name] ? diagrams[pr.name]() : ''}
                    <div class="chip-group">${renderChips(pr.technologies)}</div>
                    <ul>${(pr.features || []).map(f => `<li>${f}</li>`).join('')}</ul>
                    <div class="cta-row">
                        ${pr.github ? `<a href="${pr.github}" target="_blank" rel="noopener noreferrer" class="btn btn--ghost"><i class="fas fa-code"></i> View code</a>` : ''}
                        ${pr.live_demo ? `<a href="${pr.live_demo}" target="_blank" rel="noopener noreferrer" class="btn btn--ghost"><i class="fas fa-external-link-alt"></i> Live demo</a>` : ''}
                    </div>
                </div>
            `).join('');

            return `
                <section class="section" id="projects">
                    <div class="wrap">
                        <p class="section-label">04 — Projects</p>
                        <h2 class="section-heading">Selected work</h2>
                        ${items}
                    </div>
                </section>
            `;
        }

        function renderMore(data) {
            const certs = (data.certifications || []).map(c => `
                <li><strong>${c.name}</strong> — ${c.issuer} <span style="color:var(--ink-mute);">(${c.year}${c.status === 'in-progress' ? ', in progress' : ''})</span></li>
            `).join('');

            const leadershipRoles = ((data.leadership && data.leadership.roles) || []).map(r => `
                <p style="margin-bottom:0.4rem;"><strong>${r.title}</strong> — ${r.organization}</p>
                <ul>${(r.responsibilities || []).map(resp => `<li>${resp}</li>`).join('')}</ul>
            `).join('');

            const langs = (data.languages || []).map(l => `<span class="chip">${l.language} · ${l.proficiency}</span>`).join('');

            return `
                <section class="section section--tint" id="more">
                    <div class="wrap">
                        <p class="section-label">More</p>
                        <h2 class="section-heading">Certifications, languages &amp; leadership</h2>
                        <div class="skills-grid">
                            <div class="skill-group">
                                <h3>Certifications</h3>
                                <ul style="padding-left:1.1rem; color:var(--ink-soft); font-size:0.92rem;">${certs}</ul>
                            </div>
                            <div class="skill-group">
                                <h3>Languages</h3>
                                <div class="chip-group">${langs}</div>
                            </div>
                            <div class="skill-group">
                                <h3>Leadership</h3>
                                ${leadershipRoles}
                            </div>
                            <div class="skill-group">
                                <h3>Interests</h3>
                                <div class="chip-group">${renderChips(data.interests)}</div>
                            </div>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderContact(data) {
            const s = data.socials;
            const p = data.personal;
            return `
                <section class="section" id="contact">
                    <div class="wrap">
                        <p class="section-label">05 — Contact</p>
                        <h2 class="section-heading">Let's talk</h2>
                        <p class="lede">Whether you have an interesting project, want to discuss backend architecture, or just want to say hello — I'm open to internships and technical conversations.</p>
                        <div class="link-list">
                            <a href="${s.email}" class="link-item"><i class="far fa-envelope"></i> ${p.email}</a>
                            <a href="${s.linkedin}" class="link-item" target="_blank" rel="noopener noreferrer"><i class="fab fa-linkedin"></i> ${s.linkedin.replace('https://', '')}</a>
                            <a href="${s.github}" class="link-item" target="_blank" rel="noopener noreferrer"><i class="fab fa-github"></i> ${s.github.replace('https://', '')}</a>
                            ${p.phone ? `<a href="${s.phone}" class="link-item"><i class="fas fa-phone"></i> ${p.phone}</a>` : ''}
                        </div>
                        <a href="${s.email}" class="btn btn--primary">Send me an email</a>
                    </div>
                </section>
            `;
        }

        function renderFooter(data) {
            return `
                <footer class="site-footer">
                    <p>&copy; ${new Date().getFullYear()} ${data.personal.name}. Built with hand-written HTML, CSS &amp; JS.</p>
                </footer>
            `;
        }

        function render(data) {
            const app = document.getElementById('app');
            app.innerHTML = [
                renderHero(data),
                renderAbout(data),
                renderSkills(data),
                renderExperienceEducation(data),
                renderProjects(data),
                renderMore(data),
                renderContact(data),
                renderFooter(data)
            ].join('');

            document.title = `${data.personal.name} | Backend Engineer`;

            const sections = document.querySelectorAll('.section');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('is-visible');
                });
            }, { threshold: 0.12 });
            sections.forEach(s => observer.observe(s));

            const navLinks = document.querySelectorAll('.nav-link');
            const navTargets = ['about', 'skills', 'experience', 'projects', 'contact'].map(id => document.getElementById(id));
            const navObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        navLinks.forEach(l => l.classList.toggle('active', l.getAttribute('href') === `#${entry.target.id}`));
                    }
                });
            }, { rootMargin: '-40% 0px -55% 0px' });
            navTargets.forEach(t => t && navObserver.observe(t));
        }

        fetch('public/data/data.json')
            .then(res => res.json())
            .then(render)
            .catch(err => {
                console.error('Failed to load data.json', err);
                document.getElementById('app').innerHTML = '<p class="wrap" style="color:#b91c1c;">Failed to load content. Please try again later.</p>';
            });
    </script>
</body>
</html>
