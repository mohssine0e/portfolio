<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohssine Echlaihi | Backend Engineer</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #0a0e27;
            color: #e5e7eb;
        }
        .terminal-border {
            border: 1px solid #1e293b;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }
        .card {
            background-color: #111629;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.1);
        }
        .section-title {
            color: #10b981;
            border-bottom: 2px solid #10b981;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }
        .skill-tag {
            background-color: #10b981;
            color: #0a0e27;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            margin: 0.25rem;
            display: inline-block;
        }
        .btn {
            background-color: #10b981;
            color: #0a0e27;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .btn:hover {
            background-color: #0d9a70;
            transform: translateY(-2px);
        }
        .profile-image {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #10b981;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }
        .terminal-line {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            margin: 0.5rem 0;
            color: #10b981;
        }
        .contact-link {
            display: flex;
            align-items: center;
            color: #06b6d4;
            text-decoration: none;
            margin: 0.5rem 0;
            transition: color 0.3s ease;
        }
        .contact-link:hover {
            color: #0495b5;
            transform: translateX(5px);
        }
        .timeline {
            position: relative;
            padding-left: 2rem;
            margin: 1rem 0;
        }
        .timeline:before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, #06b6d4, #10b981);
        }
        .timeline-item {
            position: relative;
            margin-bottom: 2rem;
        }
        .timeline-item:before {
            content: '';
            position: absolute;
            left: -6px;
            top: 0;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #06b6d4;
            border: 2px solid #10b981;
        }
        .footer {
            text-align: center;
            padding: 2rem 0;
            border-top: 1px solid #1e293b;
            margin-top: 3rem;
        }
        @media (max-width: 768px) {
            .profile-image {
                width: 140px;
                height: 140px;
            }
            .card {
                padding: 1.5rem;
            }
            .section-title {
                font-size: 1.5rem;
            }
            .timeline:before {
                left: 1rem;
            }
            .timeline-item:before {
                left: 0;
            }
            .timeline {
                padding-left: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-6 py-12 max-w-4xl" id="app">
        <p class="text-center text-gray-400">Loading...</p>
    </div>

    <script>
        function renderSkillTags(items) {
            return (items || []).map(s => `<span class="skill-tag">${s}</span>`).join('');
        }

        function renderHero(data) {
            const p = data.personal;
            return `
                <div class="text-center mb-16">
                    <img src="public/images/my_face.png" alt="${p.name}" class="profile-image mx-auto mb-6">
                    <h1 class="text-4xl md:text-5xl font-bold text-gray-100 mb-4">${p.name}</h1>
                    <p class="text-xl text-gray-300 mb-2">${p.title}</p>
                    <p class="text-lg text-gray-400">${p.headline}</p>
                </div>
            `;
        }

        function renderAbout(data) {
            const p = data.personal;
            return `
                <div class="card terminal-border">
                    <h2 class="section-title text-2xl">About</h2>
                    <p class="text-base leading-relaxed mb-6">${p.description}</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <p class="terminal-line"><span class="text-[#10b981]">Location:</span> ${p.location}</p>
                            <p class="terminal-line"><span class="text-[#10b981]">Stack:</span> Java + Spring Boot</p>
                        </div>
                        <div>
                            <p class="terminal-line"><span class="text-[#10b981]">Focus:</span> Microservices & Distributed Systems</p>
                            <p class="terminal-line"><span class="text-[#10b981]">Seeking:</span> PFA Internship (2-3 months)</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSkills(data) {
            const s = data.technical_skills;
            const groups = [
                ['Programming Languages', s.programming],
                ['Backend', s.backend],
                ['Frontend', s.frontend],
                ['Databases', s.databases],
                ['DevOps & Tools', s.devops_tools],
                ['Concepts', s.concepts],
                ['Other Experience', s.other]
            ];
            return `
                <div class="card terminal-border">
                    <h2 class="section-title text-2xl">Skills</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${groups.map(([label, items]) => `
                            <div>
                                <h3 class="text-xl font-bold text-gray-100 mb-3">${label}</h3>
                                <div class="flex flex-wrap">${renderSkillTags(items)}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderExperienceEducation(data) {
            const expItems = (data.experience || []).map(e => `
                <div class="timeline-item">
                    <h3 class="text-xl font-bold text-gray-100 mb-1">${e.position}</h3>
                    <p class="text-[#10b981] font-semibold mb-2">${e.company}</p>
                    <p class="text-gray-400 mb-2">${e.duration}${e.location ? ' · ' + e.location : ''}</p>
                    <div class="flex flex-wrap gap-2 mb-4">${renderSkillTags(e.technologies)}</div>
                    <ul class="list-disc list-inside text-base leading-relaxed space-y-1">
                        ${(e.responsibilities || []).map(r => `<li>${r}</li>`).join('')}
                    </ul>
                </div>
            `).join('');

            const eduItems = (data.education || []).map(ed => `
                <div class="timeline-item">
                    <h3 class="text-xl font-bold text-gray-100 mb-1">${ed.degree}</h3>
                    <p class="text-[#10b981] font-semibold mb-2">${ed.institution}</p>
                    <p class="text-gray-400 mb-2">${ed.period}${ed.honors ? ' · ' + ed.honors : ''}</p>
                    ${ed.coursework ? `<p class="text-base leading-relaxed">Coursework: ${ed.coursework.join(', ')}</p>` : ''}
                </div>
            `).join('');

            return `
                <div class="card terminal-border">
                    <h2 class="section-title text-2xl">Experience</h2>
                    <div class="timeline">${expItems}</div>
                </div>
                <div class="card terminal-border">
                    <h2 class="section-title text-2xl">Education</h2>
                    <div class="timeline">${eduItems}</div>
                </div>
            `;
        }

        function renderProjects(data) {
            const items = (data.projects || []).map(pr => `
                <div class="mb-8 last:mb-0">
                    <h3 class="text-2xl font-bold text-gray-100 mb-2">${pr.name}</h3>
                    <p class="text-base leading-relaxed mb-4">${pr.description}</p>
                    <div class="flex flex-wrap gap-2 mb-4">${renderSkillTags(pr.technologies)}</div>
                    <ul class="list-disc list-inside text-base leading-relaxed space-y-2 mb-4">
                        ${(pr.features || []).map(f => `<li>${f}</li>`).join('')}
                    </ul>
                    <div class="flex gap-4">
                        ${pr.github ? `<a href="${pr.github}" target="_blank" rel="noopener noreferrer" class="btn flex items-center gap-2"><i class="fas fa-code"></i> View Code</a>` : ''}
                        ${pr.live_demo ? `<a href="${pr.live_demo}" target="_blank" rel="noopener noreferrer" class="btn flex items-center gap-2"><i class="fas fa-external-link-alt"></i> Live Demo</a>` : ''}
                    </div>
                </div>
            `).join('');

            return `
                <div class="card terminal-border">
                    <h2 class="section-title text-2xl">Projects</h2>
                    ${items}
                </div>
            `;
        }

        function renderCertificationsLanguagesLeadership(data) {
            const certs = (data.certifications || []).map(c => `
                <li><span class="text-gray-100 font-semibold">${c.name}</span> — ${c.issuer} <span class="text-gray-400">(${c.year}${c.status === 'in-progress' ? ', in progress' : ''})</span></li>
            `).join('');

            const langs = (data.languages || []).map(l => `
                <span class="skill-tag">${l.language} — ${l.proficiency}</span>
            `).join('');

            const leadershipRoles = ((data.leadership && data.leadership.roles) || []).map(r => `
                <div class="mb-2">
                    <p class="font-semibold text-gray-100">${r.title} <span class="text-gray-400 font-normal">— ${r.organization}</span></p>
                    <ul class="list-disc list-inside text-base leading-relaxed">
                        ${(r.responsibilities || []).map(resp => `<li>${resp}</li>`).join('')}
                    </ul>
                </div>
            `).join('');

            return `
                <div class="card terminal-border">
                    <h2 class="section-title text-2xl">Certifications, Languages & Leadership</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <h3 class="text-xl font-bold text-gray-100 mb-3">Certifications</h3>
                            <ul class="list-disc list-inside space-y-1">${certs}</ul>
                            <h3 class="text-xl font-bold text-gray-100 mt-6 mb-3">Languages</h3>
                            <div class="flex flex-wrap">${langs}</div>
                        </div>
                        <div>
                            <h3 class="text-xl font-bold text-gray-100 mb-3">Leadership</h3>
                            ${leadershipRoles}
                            ${(data.interests || []).length ? `
                                <h3 class="text-xl font-bold text-gray-100 mt-6 mb-3">Interests</h3>
                                <div class="flex flex-wrap">${renderSkillTags(data.interests)}</div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderContact(data) {
            const s = data.socials;
            const p = data.personal;
            return `
                <div class="card terminal-border">
                    <h2 class="section-title text-2xl">Contact</h2>
                    <p class="text-base leading-relaxed mb-6">Whether you have an interesting project, want to discuss backend architecture, or just want to say hello, feel free to reach out. I'm always open to new opportunities and conversations.</p>

                    <a href="${s.email}" class="contact-link">
                        <i class="far fa-envelope mr-3"></i> ${p.email}
                    </a>
                    <a href="${s.linkedin}" class="contact-link" target="_blank" rel="noopener noreferrer">
                        <i class="fab fa-linkedin mr-3"></i> ${s.linkedin.replace('https://', '')}
                    </a>
                    <a href="${s.github}" class="contact-link" target="_blank" rel="noopener noreferrer">
                        <i class="fab fa-github mr-3"></i> ${s.github.replace('https://', '')}
                    </a>
                    ${p.phone ? `
                    <a href="${s.phone}" class="contact-link">
                        <i class="fas fa-phone mr-3"></i> ${p.phone}
                    </a>` : ''}

                    <div class="mt-8 text-center">
                        <p class="text-lg font-bold text-gray-100 mb-2">Ready to collaborate?</p>
                        <p class="text-gray-400 mb-4">I'm currently open to internships, contract work, and interesting technical discussions.</p>
                        <a href="${s.email}" class="btn">Send me an email</a>
                    </div>
                </div>
            `;
        }

        function renderFooter(data) {
            return `
                <footer class="footer">
                    <p class="text-gray-500">&copy; ${new Date().getFullYear()} ${data.personal.name}. All rights reserved.</p>
                    <p class="text-gray-500 mt-2">Built with HTML, CSS & Tailwind CSS</p>
                </footer>
            `;
        }

        function render(data) {
            const app = document.getElementById('app');
            app.innerHTML = [
                renderHero(data),
                renderAbout(data),
                renderSkills(data),
                renderExperienceEducation(data),
                renderProjects(data),
                renderCertificationsLanguagesLeadership(data),
                renderContact(data),
                renderFooter(data)
            ].join('');

            document.title = `${data.personal.name} | Backend Engineer`;

            const timelineItems = document.querySelectorAll('.timeline-item');
            timelineItems.forEach((item, index) => {
                item.style.opacity = '0';
                item.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
                setTimeout(() => {
                    item.style.opacity = '1';
                    item.style.transform = 'translateY(0)';
                }, 100 * index);
            });
        }

        fetch('public/data/data.json')
            .then(res => res.json())
            .then(render)
            .catch(err => {
                console.error('Failed to load data.json', err);
                document.getElementById('app').innerHTML = '<p class="text-center text-red-400">Failed to load content. Please try again later.</p>';
            });
    </script>
</body>
</html>
